<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PetCare Connect Pro — Admin Panel</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    .tab-bar { display: flex; gap: .5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .tab-bar button { padding: .5rem 1.1rem; border: none; border-radius: 6px; font-size: .9rem; font-weight: 600; cursor: pointer; background: #e0e0e0; color: #444; transition: background .2s; }
    .tab-bar button.active { background: var(--primary); color: #fff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .table-wrap { overflow-x: auto; }
    .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    canvas { max-height: 300px; }
    @media(max-width:640px){ .chart-row { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="page-header">
    <h1>🛡️ Admin Panel</h1>
    <p>Manage users, monitor activity, view analytics</p>
  </div>

  <div class="container">
    <div class="tab-bar">
      <button class="active" onclick="showTab('analytics', this)">📊 Analytics</button>
      <button onclick="showTab('reports', this)">📋 Reports</button>
      <button onclick="showTab('users', this)">👥 Users</button>
    </div>

    <!-- Analytics Tab -->
    <div id="tab-analytics" class="tab-content active">
      <div class="grid-4" id="analytics-stats" style="margin-bottom:1.5rem"></div>
      <div class="chart-row">
        <div class="card">
          <h3 style="margin-bottom:.75rem">Status Breakdown</h3>
          <canvas id="chart-status"></canvas>
        </div>
        <div class="card">
          <h3 style="margin-bottom:.75rem">Reports (Last 7 Days)</h3>
          <canvas id="chart-daily"></canvas>
        </div>
      </div>
      <div class="card mt-3" style="max-width:400px">
        <h3 style="margin-bottom:.75rem">Urgency Distribution</h3>
        <canvas id="chart-urgency"></canvas>
      </div>
    </div>

    <!-- Reports Tab -->
    <div id="tab-reports" class="tab-content">
      <div class="table-wrap card">
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th><th>Title</th><th>Reporter</th><th>Urgency</th><th>Status</th><th>Created</th><th>Action</th>
            </tr>
          </thead>
          <tbody id="reports-table-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Users Tab -->
    <div id="tab-users" class="tab-content">
      <div class="table-wrap card">
        <table class="data-table">
          <thead>
            <tr><th>#</th><th>Name</th><th>Email</th><th>Role</th><th>Joined</th><th>Change Role</th></tr>
          </thead>
          <tbody id="users-table-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="script.js"></script>
  <script>
    requireAuth();
    document.getElementById("navbar-placeholder").innerHTML = buildNavbar("admin.html");

    if (getRole() !== "admin") {
      document.querySelector(".container").innerHTML = `<div class="alert alert-error">Access denied — admin only.</div>`;
    } else {
      loadAnalytics();
      loadAdminReports();
      loadUsers();
    }

    function showTab(name, btn) {
      document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".tab-bar button").forEach(b => b.classList.remove("active"));
      document.getElementById(`tab-${name}`).classList.add("active");
      btn.classList.add("active");
    }

    // ── Analytics ────────────────────────────────────────────
    async function loadAnalytics() {
      const res = await apiFetch("/analytics");
      if (!res || !res.ok) return;
      const d = res.data;

      document.getElementById("analytics-stats").innerHTML = `
        <div class="stat-box"><div class="stat-value">${d.total_reports}</div><div class="stat-label">Total Reports</div></div>
        <div class="stat-box"><div class="stat-value" style="color:#4caf50">${d.resolved_pct}%</div><div class="stat-label">Resolved</div></div>
        <div class="stat-box"><div class="stat-value" style="color:#c62828">${d.high_urgency_pct}%</div><div class="stat-label">High Urgency</div></div>
        <div class="stat-box"><div class="stat-value" style="color:#0277bd">${d.open}</div><div class="stat-label">Open Now</div></div>
      `;

      // Status breakdown donut
      const statusLabels = d.status_breakdown.map(s => s.status.replace("_"," "));
      const statusData   = d.status_breakdown.map(s => s.count);
      new Chart(document.getElementById("chart-status"), {
        type: "doughnut",
        data: {
          labels: statusLabels,
          datasets: [{ data: statusData, backgroundColor: ["#1565c0","#e65100","#1b5e20","#4caf50"] }],
        },
        options: { plugins: { legend: { position: "bottom" } } },
      });

      // Daily bar chart
      const days   = d.daily_reports.map(r => r.day);
      const counts = d.daily_reports.map(r => r.count);
      new Chart(document.getElementById("chart-daily"), {
        type: "bar",
        data: {
          labels: days,
          datasets: [{ label: "Reports", data: counts, backgroundColor: "#4caf50" }],
        },
        options: { scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }, plugins: { legend: { display: false } } },
      });

      // Urgency pie
      new Chart(document.getElementById("chart-urgency"), {
        type: "pie",
        data: {
          labels: ["HIGH", "LOW"],
          datasets: [{ data: [d.high_urgency, d.total_reports - d.high_urgency], backgroundColor: ["#e53935","#fdd835"] }],
        },
        options: { plugins: { legend: { position: "bottom" } } },
      });
    }

    // ── Admin Reports ─────────────────────────────────────────
    async function loadAdminReports() {
      const res = await apiFetch("/reports");
      if (!res || !res.ok) return;
      const tbody = document.getElementById("reports-table-body");
      tbody.innerHTML = res.data.map(r => `
        <tr>
          <td>${r.id}</td>
          <td>${escHtml(r.title)}</td>
          <td>${escHtml(r.reporter_name)}</td>
          <td>${urgencyBadge(r.urgency)}</td>
          <td>${statusBadge(r.status)}</td>
          <td>${fmtDate(r.created_at)}</td>
          <td>
            <select class="status-select" onchange="adminUpdateStatus(${r.id}, this.value)">
              ${["OPEN","ASSIGNED","IN_PROGRESS","RESOLVED"].map(s =>
                `<option value="${s}" ${s===r.status?'selected':''}>${s.replace("_"," ")}</option>`
              ).join("")}
            </select>
          </td>
        </tr>
      `).join("");
    }

    async function adminUpdateStatus(id, status) {
      const res = await apiFetch(`/update-status/${id}`, { method: "PUT", body: JSON.stringify({ status }) });
      showToast(res && res.ok ? `Updated to ${status}` : (res ? res.data.error : "Failed"), res && res.ok ? "success" : "error");
    }

    // ── Users ─────────────────────────────────────────────────
    async function loadUsers() {
      const res = await apiFetch("/admin/users");
      if (!res || !res.ok) return;
      const tbody = document.getElementById("users-table-body");
      tbody.innerHTML = res.data.map(u => `
        <tr>
          <td>${u.id}</td>
          <td>${escHtml(u.name)}</td>
          <td>${escHtml(u.email)}</td>
          <td>${u.role}</td>
          <td>${fmtDate(u.created_at)}</td>
          <td>
            <select class="status-select" onchange="changeRole(${u.id}, this.value)">
              ${["user","volunteer","admin"].map(r =>
                `<option value="${r}" ${r===u.role?'selected':''}>${r}</option>`
              ).join("")}
            </select>
          </td>
        </tr>
      `).join("");
    }

    async function changeRole(userId, role) {
      const res = await apiFetch(`/admin/users/${userId}/role`, { method: "PUT", body: JSON.stringify({ role }) });
      showToast(res && res.ok ? "Role updated" : (res ? res.data.error : "Failed"), res && res.ok ? "success" : "error");
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
    }
  </script>
</body>
</html>
